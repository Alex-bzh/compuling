[workspace]
name = "Compuling"
version = "0.1.1"
description = "Resources to learn how to manage corpus with Python."
authors = ["Alexandre Roulois <alexandre.roulois@u-paris.fr>"]
license-file = "LICENSE"
readme = "README.md"
repository = "https://github.com/Alex-bzh/compuling"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64", "osx-64", "win-64"]

[tasks]
start = "jupyter lab"

[dependencies]
beautifulsoup4 = ">=4.14.3,<5"
chardet = ">=5.2.0,<6"
gensim = ">=4.4.0,<5"
jupyterlab = ">=4.5.5,<5"
jupyterlab-latex = ">=4.4.0,<5"
matplotlib = ">=3.10.8,<4"
nltk = ">=3.9.3,<4"
numpy = ">=2.4.2,<3"
pandas = ">=3.0.1,<4"
pillow = ">=12.1.1,<13"
pip = ">=26.0.1,<27"
python = ">=3.12.12,<3.14"
scikit-learn = ">=1.8.0,<2"
scipy = ">=1.17.1,<2"
seaborn = ">=0.13.2,<0.14"
spacy = ">=3.8.11,<4"
tabulate = ">=0.9.0,<0.10"
wordcloud = ">=1.9.6,<2"
